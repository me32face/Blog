<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Blog Post</title>
    <style>
        nav{
            text-align: right;
        }
        h2{
            text-align: center;
            text-decoration: underline;
        }
        form{
            text-align: center;
            line-height: 35px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Posts</a>
        <a href="#">Categories</a>
        <a href="#">Profile</a>
    </nav>

    <h2>Add New Post</h2>

    <form>
        <label for="blog-title" style="font-size: 20px;font-weight: 600;">Blog Title</label>

        <input type="text" id="blog-title" name="blog-title" placeholder="Enter blog title" required><br>

        <label for="blog-category">Category</label>
        <select id="blog-category" name="blog-category" required>
            <option value="technology">Technology</option>
            <option value="lifestyle">Lifestyle</option>
            <option value="travel">Travel</option>
            <option value="education">Education</option>
            <option value="food">Food</option>
        </select><br>

        <label for="blog-content" style="font-size: 20px;font-weight: 600;">Blog Content</label>
        <textarea id="blog-content" name="blog-content" placeholder="Write your blog content here" rows="10"></textarea><br>

        <button type="submit">Upload</button>
    </form>
</body>
</html>
